<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E4036"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CC5833"/>
      <stop offset="100%" style="stop-color:#2E4036"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#2E4036" opacity="0.3"/>
  <circle cx="1100" cy="530" r="300" fill="#CC5833" opacity="0.2"/>
  
  <!-- Logo -->
  <rect x="100" y="80" width="60" height="60" rx="12" fill="url(#accent)"/>
  <path d="M130 95L110 110L130 125L150 110Z" fill="white" opacity="0.9"/>
  <path d="M110 130L130 145L150 130" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <path d="M110 120L130 135L150 120" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  
  <!-- Title -->
  <text x="180" y="125" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="white">Bright Leaf Design</text>
  
  <!-- Tagline -->
  <text x="100" y="380" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="white" opacity="0.9">Where vision</text>
  <text x="100" y="470" font-family="Georgia, serif" font-size="72" font-style="italic" fill="#CC5833">meets code</text>
  
  <!-- Subtitle -->
  <text x="100" y="550" font-family="system-ui, sans-serif" font-size="24" fill="white" opacity="0.6">Design systems + agentic development</text>
</svg>
