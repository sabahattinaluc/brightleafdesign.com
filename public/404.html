<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Bright Leaf Design</title>
    <meta name="description" content="The page you're looking for doesn't exist.">
    
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    
    <meta property="og:title" content="404 - Page Not Found | Bright Leaf Design">
    <meta property="og:description" content="The page you're looking for doesn't exist.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sabahattinaluc.github.io/brightleafdesign.com/">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: #F2F0E9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 500px;
      }
      .error-code {
        font-size: 8rem;
        font-weight: 800;
        color: #2E4036;
        line-height: 1;
        margin-bottom: 1rem;
      }
      .error-code span {
        color: #CC5833;
      }
      h1 {
        font-size: 1.5rem;
        color: #1A1A1A;
        margin-bottom: 1rem;
      }
      p {
        color: #6B6B6B;
        margin-bottom: 2rem;
      }
      a {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #2E4036;
        color: white;
        text-decoration: none;
        border-radius: 100px;
        font-weight: 600;
        transition: background 0.3s;
      }
      a:hover {
        background: #CC5833;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">4<span>0</span>4</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/brightleafdesign.com/">Back to Home</a>
    </div>
    <script>
      // SPA fallback: redirect all 404s to index.html for client-side routing
      sessionStorage.setItem('404_referrer', document.referrer)
    </script>
  </body>
</html>
